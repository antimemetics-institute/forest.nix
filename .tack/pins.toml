# tack pins. edit by hand or with tack add / rm / alias
# nix reads pins.lock.json; this file drives tack update

# shorturl schemes. scheme:rest expands rest into {path}
[shorturls]
channel = "https://channels.nixos.org/{path}/nixexprs.tar.xz"
# gh = "github:{path}"

# all_follow: input name -> top-level pin it follows wherever it appears
# opt out per-input with exclude_follow
[all_follow]
nixpkgs = "nixpkgs"
# nixpkgs = "nixpkgs"
# nixpkgs = ["nixpkgs-stable", "nixpkgs-unstable"]

# [inputs.<name>] fields
#   url             required, shorturl ok; ?rev=<sha> pins an exact commit
#   type            flake (default), fetch, or fixed
#   flake           legacy false means type = "fetch"
#   follows         { child = "pin" } override map
#   exclude_follow  all_follow names to skip
#   dir             subdir holding flake.nix
#   submodules      fetch git submodules
#   unpack          fixed-only: tarball or file
[inputs.nixpkgs]
url = "channel:nixos-unstable"

[inputs."microvm.nix"]
url = "github:microvm-nix/microvm.nix"

[inputs.sops-nix]
url = "github:Mic92/sops-nix"

[inputs.tack]
url = "github:manic-systems/tack"
